<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background: transparent; margin: 0; padding: 15px; overflow-x: hidden; }
        /* Принудительное исправление для Osclass */
        input, select, textarea { width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; }
        .step { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="max-w-full mx-auto bg-white rounded-2xl shadow-lg border border-gray-200 p-5 md:p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4 text-center">טופס הגשת מועמדות</h2>

    <form id="hrForm" class="space-y-6">
        <div id="step1" class="step space-y-5">
            <div class="w-full">
                <label class="block text-sm font-bold text-gray-700 mb-1">שם מלא</label>
                <input type="text" name="fullName" required class="p-3 border-2 border-gray-100 rounded-xl bg-gray-50 focus:border-blue-500 focus:bg-white outline-none">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="w-full">
                    <label class="block text-sm font-bold text-gray-700 mb-1">מספר טלפון</label>
                    <input type="tel" name="phone" required class="p-3 border-2 border-gray-100 rounded-xl bg-gray-50 focus:border-blue-500 focus:bg-white outline-none">
                </div>
                <div class="w-full">
                    <label class="block text-sm font-bold text-gray-700 mb-1">דואר אלקטרוני</label>
                    <input type="email" name="email" required class="p-3 border-2 border-gray-100 rounded-xl bg-gray-50 focus:border-blue-500 focus:bg-white outline-none">
                </div>
            </div>

            <div class="w-full">
                <label class="block text-sm font-bold text-gray-700 mb-1">הגשת מועמדות עבור משרה מספר</label>
                <input type="text" name="positionId" class="p-3 border-2 border-gray-100 rounded-xl bg-gray-50 focus:border-blue-500 focus:bg-white outline-none">
            </div>

            <div class="pt-4 text-center border-t">
                <p class="font-bold text-gray-800 mb-4">האם יש לך את הניסיון הנדרש למשרה?</p>
                <div class="flex gap-3">
                    <button type="button" onclick="goTo('step2')" class="flex-1 py-4 bg-green-600 text-white font-bold rounded-xl shadow-md hover:bg-green-700 transition">כן</button>
                    <button type="button" onclick="goTo('stepLow')" class="flex-1 py-4 bg-red-500 text-white font-bold rounded-xl shadow-md hover:bg-red-600 transition">לא</button>
                </div>
            </div>
        </div>

        <div id="step2" class="step hidden space-y-5">
            <div class="w-full">
                <label class="block text-sm font-bold text-gray-700 mb-2">איך תרצה להגיש את קורות החיים?</label>
                <select id="cvMethod" onchange="toggleInputs()" class="p-3 border-2 border-gray-100 rounded-xl bg-gray-50 outline-none">
                    <option value="">בחר אפשרות...</option>
                    <option value="file">📄 העלאת קובץ קורות חיים</option>
                    <option value="link">🔗 קישור ל-LinkedIn</option>
                </select>
            </div>

            <div id="fileInputDiv" class="hidden w-full border-2 border-dashed rounded-xl p-6 text-center bg-blue-50">
                <input type="file" id="cvFile" class="text-sm">
                <p class="text-xs text-gray-400 mt-2">PDF, DOCX (Max 10MB)</p>
            </div>

            <div id="linkInputDiv" class="hidden w-full">
                <input type="url" name="linkedin" placeholder="https://linkedin.com/in/..." class="p-3 border-2 border-gray-100 rounded-xl bg-gray-50 outline-none w-full">
            </div>

            <div class="flex justify-between items-center pt-4">
                <button type="button" onclick="goTo('step1')" class="text-blue-600 font-bold underline">חזור</button>
                <button type="submit" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg">שלח</button>
            </div>
        </div>

        <div id="stepLow" class="step hidden space-y-5">
            <div class="bg-orange-50 p-4 rounded-xl border-r-4 border-orange-400">
                <p class="text-orange-900 text-sm">נראה שאין לך את דרישות המינימום, כתוב לנו למה כדאי לנו לשקול אותך בכל זאת:</p>
            </div>
            <textarea name="experienceReason" class="w-full p-4 border-2 border-gray-100 rounded-xl h-32 bg-gray-50 outline-none"></textarea>
            <div class="flex justify-between items-center pt-4">
                <button type="button" onclick="goTo('step1')" class="text-blue-600 font-bold underline">חזור</button>
                <button type="submit" class="bg-gray-800 text-white px-10 py-3 rounded-xl font-bold shadow-lg">שלח בכל זאת</button>
            </div>
        </div>
    </form>
</div>

<script>
    function updateHeight() {
        window.parent.postMessage({ height: document.body.scrollHeight + 50 }, "*");
    }

    function goTo(stepId) {
        ['step1', 'step2', 'stepLow'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(stepId).classList.remove('hidden');
        setTimeout(updateHeight, 100);
    }

    function toggleInputs() {
        const val = document.getElementById('cvMethod').value;
        document.getElementById('fileInputDiv').classList.toggle('hidden', val !== 'file');
        document.getElementById('linkInputDiv').classList.toggle('hidden', val !== 'link');
        setTimeout(updateHeight, 100);
    }

    window.onload = updateHeight;
    window.onresize = updateHeight;
</script>

</body>
</html>
