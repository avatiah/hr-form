<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: transparent; margin: 0; padding: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="form-card" class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow-md border border-gray-100">
        <h2 class="text-xl font-bold mb-6 text-center text-gray-800">טופס הגשת מועמדות</h2>
        
        <form id="hrForm" class="space-y-4">
            <div id="step1" class="space-y-4">
                <input type="text" name="fullName" placeholder="שם מלא" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <div class="flex flex-col md:flex-row gap-4">
                    <input type="tel" name="phone" placeholder="טלפון" required class="flex-1 p-3 border rounded-lg">
                    <input type="email" name="email" placeholder="דואר אלקטרוני" required class="flex-1 p-3 border rounded-lg">
                </div>
                <input type="text" name="positionId" placeholder="משרה מספר" class="w-full p-3 border rounded-lg">
                
                <div class="p-4 bg-gray-50 rounded-lg text-center">
                    <p class="font-semibold mb-3">האם יש לך את הניסיון הנדרש?</p>
                    <div class="flex justify-center gap-4">
                        <button type="button" onclick="goTo('step2')" class="bg-green-600 text-white px-6 py-2 rounded-full hover:bg-green-700 transition">כן</button>
                        <button type="button" onclick="goTo('stepLow')" class="bg-red-500 text-white px-6 py-2 rounded-full hover:bg-red-600 transition">לא</button>
                    </div>
                </div>
            </div>

            <div id="stepLow" class="hidden space-y-4">
                <p class="text-red-600 text-sm font-medium text-center">נראה שאין לך את דרישות המינימום, כתוב לנו למה כדאי לנו לשקול אותך:</p>
                <textarea name="experienceReason" class="w-full p-3 border rounded-lg h-32"></textarea>
                <div class="flex justify-between items-center">
                    <button type="button" onclick="goTo('step1')" class="text-gray-500 underline">חזור</button>
                    <button type="submit" class="bg-gray-800 text-white px-6 py-2 rounded-lg">שלח בכל זאת</button>
                </div>
            </div>

            <div id="step2" class="hidden space-y-4">
                <select id="cvMethod" onchange="toggleInputs()" class="w-full p-3 border rounded-lg bg-white">
                    <option value="">איך תרצה להגיש קורות חיים?</option>
                    <option value="file">העלאת קובץ</option>
                    <option value="link">קישור ל-LinkedIn</option>
                </select>
                
                <div id="fileInputDiv" class="hidden">
                    <input type="file" id="cvFile" class="w-full">
                </div>
                
                <div id="linkInputDiv" class="hidden">
                    <input type="url" name="linkedin" placeholder="https://linkedin.com/in/..." class="w-full p-3 border rounded-lg">
                </div>

                <div class="flex justify-between items-center pt-4">
                    <button type="button" onclick="goTo('step1')" class="text-gray-500 underline">חזור</button>
                    <button type="submit" id="submitBtn" class="bg-blue-600 text-white px-8 py-2 rounded-lg font-bold shadow-lg">שלח מועמדות</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        const SCRIPT_URL = 'ВАШ_URL_GOOGLE_SCRIPT';

        function goTo(stepId) {
            ['step1', 'step2', 'stepLow'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(stepId).classList.remove('hidden');
            // Сообщаем родителю (Osclass) об изменении высоты
            window.parent.postMessage({ height: document.body.scrollHeight }, "*");
        }

        function toggleInputs() {
            const val = document.getElementById('cvMethod').value;
            document.getElementById('fileInputDiv').classList.toggle('hidden', val !== 'file');
            document.getElementById('linkInputDiv').classList.toggle('hidden', val !== 'link');
            window.parent.postMessage({ height: document.body.scrollHeight }, "*");
        }

        document.getElementById('hrForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = 'שולח...';

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            const fileEl = document.getElementById('cvFile');
            if (fileEl.files[0]) {
                const reader = new FileReader();
                reader.readAsDataURL(fileEl.files[0]);
                await new Promise(r => reader.onload = () => { data.fileData = reader.result; data.fileName = fileEl.files[0].name; r(); });
            }

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                document.getElementById('form-card').innerHTML = '<div class="text-center p-10 text-green-600 font-bold">הטופס נשלח בהצלחה! תודה.</div>';
            } catch (e) {
                alert('שגיאה בשליחה');
                btn.disabled = false; btn.innerText = 'שלח מועמדות';
            }
        };
    </script>
</body>
</html>
