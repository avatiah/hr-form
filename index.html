<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: transparent; margin: 0; padding: 16px; font-family: system-ui, -apple-system, sans-serif; }
        .input-focus:focus { border-color: #3b82f6; ring: 2px; ring-color: #bfdbfe; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="form-card" class="max-w-full mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-gray-100">
        <h2 class="text-2xl font-bold mb-8 text-center text-gray-800">הגשת מועמדות למשרה</h2>
        
        <form id="hrForm" class="space-y-6">
            <div id="step1" class="space-y-5">
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-gray-600 mr-1">שם מלא</label>
                    <input type="text" name="fullName" placeholder="ישראל ישראלי" required 
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none transition-all focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-gray-600 mr-1">מספר טלפון</label>
                        <input type="tel" name="phone" placeholder="050-0000000" required 
                            class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none transition-all focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-gray-600 mr-1">דואר אלקטרוני</label>
                        <input type="email" name="email" placeholder="example@mail.com" required 
                            class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none transition-all focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-gray-600 mr-1">הגשת מועמדות עבור משרה מספר</label>
                    <input type="text" name="positionId" placeholder="Например: 1024" 
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none transition-all focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100">
                </div>
                
                <div class="pt-4">
                    <p class="font-bold text-gray-700 text-center mb-4 text-lg">האם יש לך את הניסיון הנדרש למשרה?</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button type="button" onclick="goTo('step2')" class="flex flex-col items-center justify-center p-6 border-2 border-gray-100 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition-all group">
                            <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">✅</span>
                            <span class="font-bold text-gray-700">כן, יש לי ניסיון</span>
                        </button>
                        <button type="button" onclick="goTo('stepLow')" class="flex flex-col items-center justify-center p-6 border-2 border-gray-100 rounded-2xl hover:border-red-500 hover:bg-red-50 transition-all group">
                            <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">❌</span>
                            <span class="font-bold text-gray-700">לא, אין לי ניסיון</span>
                        </button>
                    </div>
                </div>
            </div>

            <div id="stepLow" class="hidden space-y-5 animate-fade-in">
                <div class="bg-red-50 p-4 rounded-xl border-r-4 border-red-500">
                    <p class="text-red-700 font-medium text-sm">נראה שאין לך את דרישות המינימוм, אך אם יש סיבה מיוחדת שנשקול אותך, נשמח לשמוע:</p>
                </div>
                <textarea name="experienceReason" placeholder="כתוב כאן..." class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl h-40 outline-none focus:bg-white focus:border-red-500 focus:ring-4 focus:ring-red-100"></textarea>
                <div class="flex justify-between items-center pt-4">
                    <button type="button" onclick="goTo('step1')" class="text-gray-400 hover:text-gray-600 font-medium">← חזור</button>
                    <button type="submit" class="bg-gray-800 text-white px-8 py-4 rounded-xl font-bold shadow-lg hover:bg-black transition-colors">שלח מועמדות</button>
                </div>
            </div>

            <div id="step2" class="hidden space-y-6 animate-fade-in">
                <div class="space-y-3">
                    <label class="block text-center font-bold text-lg text-gray-700">איך תרצה להעביר לנו את פרטיך?</label>
                    <select id="cvMethod" onchange="toggleInputs()" class="w-full p-4 bg-white border-2 border-gray-200 rounded-xl font-semibold outline-none focus:border-blue-500">
                        <option value="">בחר אמצעי הגשה...</option>
                        <option value="file">📄 העלאת קובץ קורות חיים</option>
                        <option value="link">🔗 קישור לפרופיל LinkedIn</option>
                    </select>
                </div>
                
                <div id="fileInputDiv" class="hidden p-6 border-2 border-dashed border-gray-200 rounded-2xl bg-gray-50 text-center">
                    <input type="file" id="cvFile" class="hidden">
                    <label for="cvFile" class="cursor-pointer">
                        <span class="text-blue-600 font-bold block mb-1 underline">לחץ להעלאת קובץ</span>
                        <span class="text-xs text-gray-400">PDF, DOCX (עד 10MB)</span>
                    </label>
                </div>
                
                <div id="linkInputDiv" class="hidden">
                    <input type="url" name="linkedin" placeholder="https://www.linkedin.com/in/yourprofile" class="w-full p-4 border border-gray-200 rounded-xl focus:border-blue-500 focus:ring-4 focus:ring-blue-100">
                </div>

                <div class="flex justify-between items-center pt-6">
                    <button type="button" onclick="goTo('step1')" class="text-gray-400 hover:text-gray-600 font-medium">← חזור</button>
                    <button type="submit" id="submitBtn" class="bg-blue-600 text-white px-10 py-4 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-all hover:-translate-y-1">שלח מועמדות</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        // Скрипт автоматического ресайза для Osclass
        function updateHeight() {
            window.parent.postMessage({ height: document.body.scrollHeight + 40 }, "*");
        }

        function goTo(stepId) {
            ['step1', 'step2', 'stepLow'].forEach(s => document.getElementById(s).classList.add('hidden'));
            const next = document.getElementById(stepId);
            next.classList.remove('hidden');
            setTimeout(updateHeight, 10);
        }

        function toggleInputs() {
            const val = document.getElementById('cvMethod').value;
            document.getElementById('fileInputDiv').classList.toggle('hidden', val !== 'file');
            document.getElementById('linkInputDiv').classList.toggle('hidden', val !== 'link');
            setTimeout(updateHeight, 10);
        }

        // Вызываем при загрузке
        window.onload = updateHeight;
    </script>
</body>
</html>
