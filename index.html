<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טופס הגשת מועמדות</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; display: flex; justify-content: center; }
        .form-container { width: 100%; max-width: 800px; background: #fff; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 8px; margin: 20px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input[type="text"], input[type="email"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .footer-text { margin-top: 30px; padding: 15px; background: #f0f0f0; border-radius: 4px; font-size: 0.9em; color: #555; text-align: center; }
        .btn-submit { background: #1a73e8; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>טופס הגשת מועמדות</h2>
    
    <form id="hr-form">
        <div class="field">
            <label>שם מלא *</label>
            <input type="text" name="name" required placeholder="התשובה שלך">
        </div>

        <div class="field">
            <label>מספר טלפון *</label>
            <input type="text" name="phone" required placeholder="התשובה שלך">
        </div>

        <div class="field">
            <label>פרטים מקצועיים *</label>
            <input type="radio" name="cv_status" value="yes" checked> קובץ קורות חיים <br>
            <input type="radio" name="cv_status" value="no"> אין לי קורות חיים
        </div>

        <div class="field">
            <label>ניסיון תעסוקתי</label>
            <textarea name="experience" rows="4" placeholder="תאר את הניסיון שלך..."></textarea>
        </div>

        <button type="submit" class="btn-submit">שליחה</button>

        <div class="footer-text">
            <strong>הגשת מועמדות אתה מסכים להעברת הנתונים שלך למעביד.</strong><br>
            לתשומת לבך: הנתונים אינם נשמרים בשרת לאחר השליחה.
        </div>
    </form>
</div>

<script>
    // Скрипт для передачи высоты в Osclass
    function sendHeight() {
        const height = document.body.scrollHeight;
        window.parent.postMessage({ height: height }, "*");
    }
    window.onload = sendHeight;
    window.onresize = sendHeight;
</script>

</body>
</html>
