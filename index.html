<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טופס הגשת מועמדות</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; overflow-x: hidden; }
        .form-container { width: 100%; max-width: 800px; background: #fff; padding: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-radius: 12px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #eef0f2; padding-bottom: 15px; }
        .field { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; }
        input[type="text"], input[type="email"], input[type="tel"], textarea, select { 
            width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #1a73e8; }
        .radio-group { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; }
        .hidden { display: none; }
        .sub-section { border-right: 4px solid #1a73e8; padding: 15px 20px 15px 15px; margin: 20px 0; background: #fafafa; border-radius: 4px; }
        .btn-submit { background: #1a73e8; color: white; padding: 16px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.1em; font-weight: bold; margin-top: 20px; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        .required-star { color: #d32f2f; margin-right: 4px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>טופס הגשת מועמדות</h2>
    
    <form id="hr-form">
        <div class="field">
            <label>שם מלא <span class="required-star">*</span></label>
            <input type="text" name="full_name" required>
        </div>

        <div class="field">
            <label>מספר טלפון <span class="required-star">*</span></label>
            <input type="tel" name="phone" pattern="[0-9]{9,10}" required>
        </div>

        <div class="field">
            <label>דואר אלקטרוני <span class="required-star">*</span></label>
            <input type="email" name="email" required>
        </div>

        <div class="field">
            <label>משרה מספר <span class="required-star">*</span></label>
            <input type="text" name="job_id" required>
        </div>

        <div class="field radio-group">
            <label>האם יש לך את הניסיון הנדרש למשרה? <span class="required-star">*</span></label>
            <label><input type="radio" name="has_experience" value="yes" onclick="toggleExperience(true)" required> כן</label>
            <label><input type="radio" name="has_experience" value="no" onclick="toggleExperience(false)"> לא</label>
        </div>

        <div id="resume-options-block" class="sub-section hidden">
            <label>איך תרצה להגיש קורות חיים? <span class="required-star">*</span></label>
            <select name="resume_method" id="resume_method" onchange="toggleResumeFields()">
                <option value="">בחר...</option>
                <option value="file">קובץ</option>
                <option value="linkedin">לינקדאין</option>
                <option value="manual">ידני</option>
            </select>

            <div id="field-file" class="field hidden">
                <label>צרף קובץ <span class="required-star">*</span></label>
                <input type="file" name="cv_file" id="cv_file_input">
            </div>
            
            </div>

        <button type="submit" class="btn-submit" id="submit-btn">שליחת המועמדות</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz63uL-LUUGdu0M67uH9n-naBeE11khTwbteGi6WlJ04UEEGtx7fc8PVX3UtlaC9usj/exec';
    const form = document.getElementById('hr-form');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'שולח...';

        const formData = new FormData(form);
        const dataObj = {};
        formData.forEach((value, key) => { if (key !== 'cv_file') dataObj[key] = value; });

        const fileInput = document.getElementById('cv_file_input');
        
        const sendToDatabase = async (payload) => {
            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                alert("הטופס נשלח בהצלחה!");
                form.reset();
                location.reload(); 
            } catch (error) {
                console.error('Submission error:', error);
                alert("שגיאה בשליחה.");
            } finally {
                btn.disabled = false;
                btn.innerText = 'שליחת המועמדות';
            }
        };

        if (fileInput && fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = async () => {
                dataObj['fileData'] = reader.result;
                dataObj['fileName'] = file.name;
                await sendToDatabase(dataObj);
            };
            reader.readAsDataURL(file);
        } else {
            await sendToDatabase(dataObj);
        }
    });

    function toggleExperience(hasExp) {
        document.getElementById('resume-options-block').classList.toggle('hidden', !hasExp);
        updateHeight();
    }

    function toggleResumeFields() {
        const val = document.getElementById('resume_method').value;
        document.getElementById('field-file').classList.toggle('hidden', val !== 'file');
        updateHeight();
    }

    function updateHeight() {
        if (window.parent) window.parent.postMessage({ height: document.body.scrollHeight }, "*");
    }
    window.onload = updateHeight;
</script>
</body>
</html>
