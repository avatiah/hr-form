<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טופס הגשת מועמדות</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .form-container { width: 100%; max-width: 800px; background: #fff; padding: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-radius: 12px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #eef0f2; padding-bottom: 15px; }
        .field { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; }
        input[type="text"], input[type="email"], input[type="tel"], input[type="date"], textarea, select { 
            width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #1a73e8; }
        .radio-group { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; }
        .hidden { display: none; }
        .sub-section { border-right: 4px solid #1a73e8; padding: 15px 20px 15px 15px; margin: 20px 0; background: #fafafa; border-radius: 4px; }
        .footer-text { margin-top: 25px; padding: 15px; background: #fff3e0; border-right: 5px solid #ff9800; border-radius: 4px; font-size: 0.9em; line-height: 1.5; }
        .btn-submit { background: #1a73e8; color: white; padding: 16px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.1em; font-weight: bold; margin-top: 20px; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        .required-star { color: #d32f2f; margin-right: 4px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>טופס הגשת מועמדות</h2>
    <form id="hr-form">
        <div class="field"><label>שם מלא <span class="required-star">*</span></label><input type="text" name="full_name" required></div>
        <div class="field"><label>מספר טלפון (9 ספרות) <span class="required-star">*</span></label><input type="tel" name="phone" pattern="[0-9]{9,10}" required></div>
        <div class="field"><label>דואר אלקטרוני <span class="required-star">*</span></label><input type="email" name="email" required></div>
        <div class="field"><label>הגשת מועמדות עבור משרה מספר <span class="required-star">*</span></label><input type="text" name="job_id" required></div>
        <div class="field"><label>כמה מילים על עצמך <span class="required-star">*</span></label><textarea name="about_me" rows="3" required></textarea></div>
        <div class="field"><label>מתי נוכל לדבר איתך <span class="required-star">*</span></label><input type="text" name="best_time" required></div>

        <div class="field radio-group">
            <label>האם יש לך את הניסיון הנדרש למשרה? <span class="required-star">*</span></label>
            <label><input type="radio" name="has_experience" value="yes" onclick="toggleExperience(true)" required> כן</label>
            <label><input type="radio" name="has_experience" value="no" onclick="toggleExperience(false)"> לא</label>
        </div>

        <div id="no-experience-block" class="sub-section hidden">
            <p style="color: #d32f2f; font-weight: bold;">על פניו, נראה שאין לך את כל דרישות המינימום.</p>
            <div class="field"><label>נא לרשום כאן כמה מילים מדוע כדאי לשקול אותך <span class="required-star">*</span></label><textarea name="reasons_to_offer" id="reasons_to_offer" rows="3"></textarea></div>
            <div class="field"><label>מה אתה מעדיף?</label>
                <label><input type="radio" name="no_exp_choice" value="continue" onclick="toggleResumeOptions(true)"> רוצה להמשיך</label><br>
                <label><input type="radio" name="no_exp_choice" value="finish" onclick="toggleResumeOptions(false)"> רוצה לסיים</label>
            </div>
        </div>

        <div id="resume-options-block" class="sub-section hidden">
            <label>איך תרצה להציג את הניסיון שלך? <span class="required-star">*</span></label>
            <select name="resume_method" id="resume_method" onchange="toggleResumeFields()">
                <option value="">בחר אפשרות...</option>
                <option value="file">קובץ קורות חיים</option>
                <option value="linkedin">פרופיל לינקדאין</option>
                <option value="manual">אין לי קורות חיים - מילוי ידני</option>
            </select>

            <div id="field-file" class="field hidden"><label>צרף קובץ <span class="required-star">*</span></label><input type="file" name="cv_file" id="cv_file_input"></div>
            <div id="field-linkedin" class="field hidden"><label>כתובת לינקדאין <span class="required-star">*</span></label><input type="text" name="linkedin_url"></div>
            <div id="field-manual" class="hidden">
                <div class="field"><label>איזור עבודה <span class="required-star">*</span></label><input type="text" name="work_area"></div>
                <div class="field"><label>השכלה <span class="required-star">*</span></label><input type="text" name="education_inst"></div>
                <div class="field"><label>מוסד <span class="required-star">*</span></label><input type="text" name="education_name"></div>
                <div class="field"><label>שנת סיום <span class="required-star">*</span></label><input type="date" name="education_end"></div>
                <div class="field"><label>חברה אחרונה <span class="required-star">*</span></label><input type="text" name="last_company"></div>
                <div class="field"><label>תפקיד <span class="required-star">*</span></label><input type="text" name="job_title"></div>
                <div class="field"><label>תאריך התחלה <span class="required-star">*</span></label><input type="date" name="job_start"></div>
                <div class="field"><label>תאריך סיום <span class="required-star">*</span></label><input type="date" name="job_end"></div>
                <div class="field"><label>שירות צבאי/לאומי</label><input type="text" name="service_details"></div>
            </div>
        </div>

        <div class="footer-text">
            בעת הגשת המועמדות אתה מסכים להעברת הנתונים שלך למעביד. <br>
            <strong>לתשומת לבך:</strong> הנתונים אינם נשמרים בשרת האתר isradata.com לאחר השליחה.
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">שליחת המועמדות</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz63uL-LUUGdu0M67uH9n-naBeE11khTwbteGi6WlJ04UEEGtx7fc8PVX3UtlaC9usj/exec';
    const form = document.getElementById('hr-form');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'שולח...';

        const formData = new FormData(form);
        const dataObj = {};
        formData.forEach((value, key) => { if (key !== 'cv_file') dataObj[key] = value; });

        const sendRequest = async (payload) => {
            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                alert("הנתונים התקבלו בהצלחה במערכת isradata.com!");
                form.reset();
                location.reload();
            } catch (err) {
                alert("שגיאה בשליחה.");
            } finally {
                btn.disabled = false;
                btn.innerText = 'שליחת המועמדות';
            }
        };

        const fileInput = document.getElementById('cv_file_input');
        if (fileInput && fileInput.files.length > 0) {
            const reader = new FileReader();
            reader.onload = () => {
                dataObj['fileData'] = reader.result;
                dataObj['fileName'] = fileInput.files[0].name;
                sendRequest(dataObj);
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            sendRequest(dataObj);
        }
    });

    function toggleExperience(has) {
        document.getElementById('no-experience-block').classList.toggle('hidden', has);
        document.getElementById('resume-options-block').classList.toggle('hidden', !has);
        sendHeight();
    }
    function toggleResumeOptions(cont) {
        document.getElementById('resume-options-block').classList.toggle('hidden', !cont);
        sendHeight();
    }
    function toggleResumeFields() {
        const m = document.getElementById('resume_method').value;
        document.getElementById('field-file').classList.toggle('hidden', m !== 'file');
        document.getElementById('field-linkedin').classList.toggle('hidden', m !== 'linkedin');
        document.getElementById('field-manual').classList.toggle('hidden', m !== 'manual');
        sendHeight();
    }
    function sendHeight() { if (window.parent) window.parent.postMessage({ height: document.body.scrollHeight }, "*"); }
    window.onload = sendHeight;
</script>
</body>
    <div id="custom-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:12px; text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.3); max-width:400px;">
        <p style="font-size:1.2em; margin-bottom:20px;">הנתונים התקבלו בהצלחה במערכת isradata.com!</p>
        <button onclick="location.reload()" style="background:#1a73e8; color:white; border:none; padding:10px 25px; border-radius:6px; cursor:pointer; font-weight:bold;">אישור</button>
    </div>
</div>
</html>
